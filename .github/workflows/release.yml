name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and parse version tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Tag '$TAG' does not match expected format vMAJOR.MINOR.PATCH"
            exit 1
          fi
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          VERSION_NAME="${MAJOR}.${MINOR}.${PATCH}"
          VERSION_CODE=$(( MAJOR * 1000000 + MINOR * 1000 + PATCH ))
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION_NAME} (code ${VERSION_CODE})"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true

      - name: Decode keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "::error::SIGNING_KEYSTORE_BASE64 secret is not set. Cannot build a signed release."
            exit 1
          fi
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          BUILD_VERSION_CODE: ${{ steps.version.outputs.code }}
          BUILD_VERSION_NAME: ${{ steps.version.outputs.name }}
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: chmod +x gradlew && ./gradlew assembleRelease

      - name: Build release AAB
        env:
          BUILD_VERSION_CODE: ${{ steps.version.outputs.code }}
          BUILD_VERSION_NAME: ${{ steps.version.outputs.name }}
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Rename artifacts
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/redAutoAlert-${{ steps.version.outputs.name }}.apk
          mv app/build/outputs/bundle/release/app-release.aab \
             app/build/outputs/bundle/release/redAutoAlert-${{ steps.version.outputs.name }}.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/redAutoAlert-${{ steps.version.outputs.name }}.apk
            app/build/outputs/bundle/release/redAutoAlert-${{ steps.version.outputs.name }}.aab
          make_latest: true
          prerelease: false
