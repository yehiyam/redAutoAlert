name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true

      - name: Compute version info
        id: version
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          VERSION_NAME="1.0.${VERSION_CODE}"
          echo "code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "::error::SIGNING_KEYSTORE_BASE64 secret is not set. Cannot build a consistently-signed release APK."
            exit 1
          fi
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          BUILD_VERSION_CODE: ${{ steps.version.outputs.code }}
          BUILD_VERSION_NAME: ${{ steps.version.outputs.name }}
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: chmod +x gradlew && ./gradlew assembleRelease

      - name: Build release AAB
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          BUILD_VERSION_CODE: ${{ steps.version.outputs.code }}
          BUILD_VERSION_NAME: ${{ steps.version.outputs.name }}
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/redAutoAlert-${{ steps.version.outputs.name }}.apk

      - name: Rename AAB
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mv app/build/outputs/bundle/release/app-release.aab \
             app/build/outputs/bundle/release/redAutoAlert-${{ steps.version.outputs.name }}.aab

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: redAutoAlert-${{ steps.version.outputs.name }}.apk
          path: app/build/outputs/apk/release/redAutoAlert-${{ steps.version.outputs.name }}.apk
          compression-level: 0

      - name: Upload AAB (artifact)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: redAutoAlert-${{ steps.version.outputs.name }}.aab
          path: app/build/outputs/bundle/release/redAutoAlert-${{ steps.version.outputs.name }}.aab
          compression-level: 0

      - name: Upload APK to rolling release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release Build
          body: "Auto-built from latest commit on main. Version ${{ steps.version.outputs.name }} (build ${{ steps.version.outputs.code }}). Download the APK directly below."
          files: |
            app/build/outputs/apk/release/redAutoAlert-${{ steps.version.outputs.name }}.apk
            app/build/outputs/bundle/release/redAutoAlert-${{ steps.version.outputs.name }}.aab
          make_latest: true
          prerelease: true
